name: 動画クリーンアップ

on:
  schedule:
    - cron: '0 15 * * *'  # 00:00 JST
  workflow_dispatch:       # 手動実行用

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: git設定
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

      - name: mainブランチ：3日以上前のサムネイル・tempファイルを削除
        run: |
          CUTOFF=$(TZ=Asia/Tokyo date -d "3 days ago" +%Y-%m-%d)
          DELETED=0

          for dir in 02_reddit_global/thumbnails 02_reddit_global/temp; do
            [ -d "$dir" ] || continue
            while IFS= read -r -d '' f; do
              FNAME=$(basename "$f")
              FILE_DATE="${FNAME:0:10}"
              if [[ "$FILE_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2} ]] && [ "$FILE_DATE" \< "$CUTOFF" ]; then
                git rm -f "$f" 2>/dev/null && DELETED=$((DELETED + 1))
              fi
            done < <(find "$dir" -type f -print0 2>/dev/null)
          done

          if [ $DELETED -gt 0 ]; then
            git commit -m "cleanup: mainブランチ ${DELETED}件削除 (${CUTOFF}以前)"
            git push
            echo "🗑️ ${DELETED}件削除しました"
          else
            echo "削除対象なし（main）"
          fi

      - name: videosブランチ：3日以上前の動画を削除
        run: |
          if ! git ls-remote --heads origin videos | grep -q videos; then
            echo "videosブランチが存在しません。スキップします。"
            exit 0
          fi

          git checkout videos

          CUTOFF=$(TZ=Asia/Tokyo date -d "3 days ago" +%Y-%m-%d)
          DELETED=0

          while IFS= read -r -d '' f; do
            FNAME=$(basename "$f")
            FILE_DATE="${FNAME:0:10}"
            if [[ "$FILE_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2} ]] && [ "$FILE_DATE" \< "$CUTOFF" ]; then
              git rm -f "$f" 2>/dev/null && DELETED=$((DELETED + 1))
            fi
          done < <(find . -name "*.mp4" -print0 2>/dev/null)

          if [ $DELETED -gt 0 ]; then
            git commit -m "cleanup: videosブランチ ${DELETED}件削除 (${CUTOFF}以前)"
            git push
            echo "🗑️ ${DELETED}件削除しました"
          else
            echo "削除対象なし（videos）"
          fi
