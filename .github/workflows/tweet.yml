name: X自動投稿

on:
  schedule:
    - cron: '0 21 * * *'   # 06:00 JST
    - cron: '30 21 * * *'  # 06:30 JST
    - cron: '0 22 * * *'   # 07:00 JST
    - cron: '30 22 * * *'  # 07:30 JST
    - cron: '0 23 * * *'   # 08:00 JST
    - cron: '30 23 * * *'  # 08:30 JST
    - cron: '0 0 * * *'    # 09:00 JST
    - cron: '30 0 * * *'   # 09:30 JST
    - cron: '0 1 * * *'    # 10:00 JST
    - cron: '30 1 * * *'   # 10:30 JST
    - cron: '0 2 * * *'    # 11:00 JST
    - cron: '30 2 * * *'   # 11:30 JST
    - cron: '0 3 * * *'    # 12:00 JST
    - cron: '30 3 * * *'   # 12:30 JST
    - cron: '0 4 * * *'    # 13:00 JST
    - cron: '30 4 * * *'   # 13:30 JST
    - cron: '0 5 * * *'    # 14:00 JST
    - cron: '30 5 * * *'   # 14:30 JST
    - cron: '0 6 * * *'    # 15:00 JST
    - cron: '30 6 * * *'   # 15:30 JST
    - cron: '0 7 * * *'    # 16:00 JST
    - cron: '30 7 * * *'   # 16:30 JST
    - cron: '0 8 * * *'    # 17:00 JST
    - cron: '30 8 * * *'   # 17:30 JST
    - cron: '0 9 * * *'    # 18:00 JST
    - cron: '30 9 * * *'   # 18:30 JST
    - cron: '0 10 * * *'   # 19:00 JST
    - cron: '30 10 * * *'  # 19:30 JST
    - cron: '0 11 * * *'   # 20:00 JST
    - cron: '30 11 * * *'  # 20:30 JST
    - cron: '0 12 * * *'   # 21:00 JST
    - cron: '30 12 * * *'  # 21:30 JST
    - cron: '0 13 * * *'   # 22:00 JST
    - cron: '30 13 * * *'  # 22:30 JST
    - cron: '0 14 * * *'   # 23:00 JST
    - cron: '30 14 * * *'  # 23:30 JST
  workflow_dispatch:        # 手動実行ボタン（テスト用）

concurrency:
  group: tweet-post
  cancel-in-progress: true   # 同時実行は1件のみ、後発はキャンセル

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02_reddit_global
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 02_reddit_global/package-lock.json

      - name: 依存パッケージをインストール
        run: npm install --omit=dev

      - name: 動画ファイルを取得
        working-directory: ${{ github.workspace }}
        run: |
          git fetch origin videos 2>/dev/null || true
          git checkout origin/videos -- 02_reddit_global/videos/ 2>/dev/null || echo "動画なし（テキストのみ投稿）"

      - name: X に投稿
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SCHEDULED_CRON: ${{ github.event.schedule }}
        run: node post_tweet.js
