name: X自動投稿

on:
  workflow_dispatch:        # cron-job.org から30分おきに呼び出す（GHA cron廃止）

concurrency:
  group: tweet-post
  cancel-in-progress: true   # 同時実行は1件のみ、後発はキャンセル

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02_reddit_global
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 02_reddit_global/package-lock.json

      - name: 依存パッケージをインストール
        run: npm install --omit=dev

      - name: 動画ファイルを取得
        working-directory: ${{ github.workspace }}
        run: |
          git fetch origin videos 2>/dev/null || true
          git checkout origin/videos -- 02_reddit_global/videos/ 2>/dev/null || echo "動画なし（テキストのみ投稿）"

      - name: X に投稿
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SCHEDULED_CRON: ${{ github.event.schedule }}
        run: node post_tweet.js
