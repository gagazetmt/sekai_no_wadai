name: X自動投稿

on:
  schedule:
    - cron: '0 21 * * *'   # 06:00 JST
    - cron: '30 21 * * *'  # 06:30 JST
    - cron: '0 22 * * *'   # 07:00 JST
    - cron: '30 22 * * *'  # 07:30 JST
    - cron: '0 23 * * *'   # 08:00 JST
    - cron: '0 11 * * *'   # 20:00 JST
    - cron: '30 11 * * *'  # 20:30 JST
    - cron: '0 12 * * *'   # 21:00 JST
    - cron: '30 12 * * *'  # 21:30 JST
    - cron: '0 13 * * *'   # 22:00 JST
  workflow_dispatch:        # 手動実行ボタン（テスト用）

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02_reddit_global
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 02_reddit_global/package-lock.json

      - name: 依存パッケージをインストール
        run: npm install --omit=dev

      - name: X に投稿
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: node post_tweet.js
